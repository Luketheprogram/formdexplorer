{% load money %}
<div class="mt-6 grid grid-cols-2 md:grid-cols-4 gap-3">
  <div class="rounded-md border border-slate-200 bg-white p-4">
    <div class="text-xs uppercase tracking-wide text-slate-500">Total filings</div>
    <div class="mt-1 text-xl font-semibold text-slate-900">{{ stats.total_filings|default:0 }}</div>
  </div>
  <div class="rounded-md border border-slate-200 bg-white p-4">
    <div class="text-xs uppercase tracking-wide text-slate-500">Last 12 months</div>
    <div class="mt-1 text-xl font-semibold text-slate-900">{{ stats.filings_last_year|default:0 }}</div>
  </div>
  <div class="rounded-md border border-slate-200 bg-white p-4">
    <div class="text-xs uppercase tracking-wide text-slate-500">Total raised</div>
    <div class="mt-1 text-xl font-semibold text-slate-900">{{ stats.total_raised|dollars }}</div>
  </div>
  <div class="rounded-md border border-slate-200 bg-white p-4">
    <div class="text-xs uppercase tracking-wide text-slate-500">Avg offering</div>
    <div class="mt-1 text-xl font-semibold text-slate-900">{{ stats.avg_raised|dollars }}</div>
  </div>
</div>
