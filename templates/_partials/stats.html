{% load money %}
<div class="mt-6 grid grid-cols-2 gap-3 md:grid-cols-4">
  <div class="card p-4">
    <div class="eyebrow">Total filings</div>
    <div class="amount mt-1.5 text-2xl font-semibold tracking-tight text-slate-900">{{ stats.total_filings|default:0 }}</div>
  </div>
  <div class="card p-4">
    <div class="eyebrow">Last 12 months</div>
    <div class="amount mt-1.5 text-2xl font-semibold tracking-tight text-slate-900">{{ stats.filings_last_year|default:0 }}</div>
  </div>
  <div class="card p-4">
    <div class="eyebrow">Total raised</div>
    <div class="amount mt-1.5 text-2xl font-semibold tracking-tight text-slate-900">{{ stats.total_raised|dollars }}</div>
  </div>
  <div class="card p-4">
    <div class="eyebrow">Avg offering</div>
    <div class="amount mt-1.5 text-2xl font-semibold tracking-tight text-slate-900">{{ stats.avg_raised|dollars }}</div>
  </div>
</div>
