{% if verified %}
  <a href="{{ issuer.website }}" target="_blank" rel="noopener nofollow" class="link inline-flex items-center gap-1">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="10" cy="10" r="7.5"/><path d="M2.5 10h15M10 2.5c-4.5 4.5-4.5 10.5 0 15M10 2.5c4.5 4.5 4.5 10.5 0 15"/></svg>
    {{ issuer.website }}
  </a>
{% elif issuer.inferred_website %}
  <a href="{{ issuer.inferred_website }}" target="_blank" rel="noopener nofollow" class="link inline-flex items-center gap-1">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="10" cy="10" r="7.5"/><path d="M2.5 10h15M10 2.5c-4.5 4.5-4.5 10.5 0 15M10 2.5c4.5 4.5 4.5 10.5 0 15"/></svg>
    {{ issuer.inferred_website }}
  </a>
  <span class="ml-1 text-xs text-amber-700">(possible website — auto-inferred, not verified)</span>
{% else %}
  <a href="https://www.google.com/search?q={{ issuer.name|add:' website'|urlencode }}"
     target="_blank" rel="noopener nofollow"
     class="inline-flex items-center gap-1 text-slate-500 underline-offset-2 transition-colors hover:text-indigo-600 hover:underline">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><circle cx="9" cy="9" r="5.5"/><path d="M13.5 13.5L17 17"/></svg>
    Find website on Google
  </a>
{% endif %}
