<form
  class="w-full"
  hx-get="{% url 'filings:search_partial' %}"
  hx-trigger="keyup changed delay:250ms from:input[name=q], change from:select, change from:input[name=state], change from:input[name=industry], change from:input[name=min_amount], change from:input[name=max_amount], submit"
  hx-target="#search-results"
  hx-push-url="false"
  hx-indicator="#search-spinner"
>
  <div class="flex flex-col md:flex-row gap-3">
    <input
      type="search"
      name="q"
      value="{{ q|default:'' }}"
      placeholder="Search issuers by name..."
      class="flex-1 rounded-md border border-slate-300 px-4 py-3 text-base focus:border-slate-500 focus:ring-1 focus:ring-slate-500 outline-none"
      autocomplete="off"
    >
    <select name="sort" class="rounded-md border border-slate-300 px-3 py-3 text-sm bg-white">
      <option value="newest" {% if sort == "newest" %}selected{% endif %}>Newest first</option>
      <option value="oldest" {% if sort == "oldest" %}selected{% endif %}>Oldest first</option>
      <option value="largest" {% if sort == "largest" %}selected{% endif %}>Largest offering</option>
      <option value="smallest" {% if sort == "smallest" %}selected{% endif %}>Smallest offering</option>
      <option value="relevance" {% if sort == "relevance" %}selected{% endif %}>Relevance</option>
    </select>
    <button type="submit" class="rounded-md bg-slate-900 px-5 py-3 text-white text-sm font-medium hover:bg-slate-800">
      Search
    </button>
  </div>
  <div class="mt-3 grid grid-cols-2 md:grid-cols-4 gap-2 text-sm">
    <input name="state" placeholder="State (e.g. CA)" value="{{ request.GET.state|default:'' }}"
      class="rounded-md border border-slate-300 px-3 py-2">
    <input name="industry" placeholder="Industry" value="{{ request.GET.industry|default:'' }}"
      class="rounded-md border border-slate-300 px-3 py-2">
    <input name="min_amount" type="number" placeholder="Min $" value="{{ request.GET.min_amount|default:'' }}"
      class="rounded-md border border-slate-300 px-3 py-2">
    <input name="max_amount" type="number" placeholder="Max $" value="{{ request.GET.max_amount|default:'' }}"
      class="rounded-md border border-slate-300 px-3 py-2">
  </div>
</form>
