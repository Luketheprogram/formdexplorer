{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-sm">
  <h1 class="text-2xl font-semibold text-slate-900">Log in</h1>
  <form method="post" class="mt-6 space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-slate-700">Email</label>
      <input type="email" name="username" required autofocus class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700">Password</label>
      <input type="password" name="password" required class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2">
    </div>
    {% if form.errors %}<p class="text-sm text-red-600">Invalid email or password.</p>{% endif %}
    <button type="submit" class="w-full rounded-md bg-slate-900 px-4 py-2 text-white font-medium hover:bg-slate-800">Log in</button>
  </form>
  <p class="mt-4 text-sm text-slate-500">No account? <a href="{% url 'accounts:signup' %}" class="underline">Sign up</a>.</p>
</div>
{% endblock %}
