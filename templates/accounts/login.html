{% extends "base.html" %}
{% block content %}
<div class="mx-auto mt-8 max-w-md">
  <div class="card p-6 md:p-8">
    <h1 class="text-xl font-bold tracking-tight text-slate-900">Log in</h1>
    <p class="mt-1 text-sm text-slate-500">Welcome back.</p>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {% if form.errors %}
      <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">Invalid email or password.</div>
      {% endif %}
      <div>
        <label class="field-label" for="id_username">Email</label>
        <input type="email" name="username" id="id_username" required autofocus class="input">
      </div>
      <div>
        <label class="field-label" for="id_password">Password</label>
        <input type="password" name="password" id="id_password" required class="input">
      </div>
      <button type="submit" class="btn-primary w-full py-2.5">Log in</button>
    </form>
    <p class="mt-6 border-t border-slate-100 pt-4 text-center text-sm text-slate-500">No account? <a href="{% url 'accounts:signup' %}" class="link">Sign up free</a></p>
  </div>
</div>
{% endblock %}
