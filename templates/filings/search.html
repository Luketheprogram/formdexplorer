{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold tracking-tight text-slate-900">Form D search</h1>
<p class="mt-1 text-sm text-slate-500">Private placement filings, updated daily from SEC EDGAR.</p>
<div class="mt-5">{% include "_partials/search_form.html" %}</div>
<div id="search-spinner" class="htmx-indicator mt-3 items-center gap-2 text-sm text-slate-500">
  <svg class="h-4 w-4 animate-spin text-indigo-500" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
  </svg>
  Searching…
</div>
<div id="search-results" class="mt-6">
  {% include "_partials/search_results.html" %}
</div>
{% endblock %}
