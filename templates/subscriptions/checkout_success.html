{% extends "base.html" %}
{% block content %}
<div class="card mx-auto mt-12 max-w-md p-8 text-center">
  <svg width="48" height="48" viewBox="0 0 48 48" fill="none" class="mx-auto text-emerald-500" aria-hidden="true">
    <circle cx="24" cy="24" r="21" stroke="currentColor" stroke-width="3"/>
    <path d="M15.5 24.5l6 6 11-12" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h1 class="mt-4 text-xl font-bold tracking-tight text-slate-900">Payment successful</h1>
  <p class="mt-2 text-sm text-slate-600">Your account will update in a moment as the webhook processes.</p>
  <a href="{% url 'accounts:account' %}" class="btn-primary mt-6">Go to account</a>
</div>
{% endblock %}
