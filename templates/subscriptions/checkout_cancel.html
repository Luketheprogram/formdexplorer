{% extends "base.html" %}
{% block content %}
<div class="card mx-auto mt-12 max-w-md p-8 text-center">
  <svg width="48" height="48" viewBox="0 0 48 48" fill="none" class="mx-auto text-slate-400" aria-hidden="true">
    <circle cx="24" cy="24" r="21" stroke="currentColor" stroke-width="3"/>
    <path d="M24 22v12" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <circle cx="24" cy="15" r="2" fill="currentColor"/>
  </svg>
  <h1 class="mt-4 text-xl font-bold tracking-tight text-slate-900">Checkout canceled</h1>
  <p class="mt-2 text-sm text-slate-600">No charge was made — your card was not billed.</p>
  <a href="{% url 'subscriptions:pricing' %}" class="btn-primary mt-6">Back to pricing</a>
</div>
{% endblock %}
