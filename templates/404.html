{% extends "base.html" %}
{% block title %}Not found — Form D Explorer{% endblock %}
{% block robots %}<meta name="robots" content="noindex">{% endblock %}
{% block content %}
<div class="mx-auto max-w-lg text-center py-12">
  <div class="text-6xl font-semibold text-slate-300">404</div>
  <h1 class="mt-4 text-2xl font-semibold text-slate-900">We couldn't find that.</h1>
  <p class="mt-3 text-slate-600">The issuer, filing, or page you're looking for doesn't exist in our index.</p>
  <div class="mt-6 flex items-center justify-center gap-3">
    <a href="/" class="rounded-md bg-slate-900 px-5 py-2 text-white text-sm font-medium">Back to search</a>
    <a href="/recent/" class="rounded-md border border-slate-300 px-5 py-2 text-sm">Recent filings</a>
  </div>
</div>
{% endblock %}
