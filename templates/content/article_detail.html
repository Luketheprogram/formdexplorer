{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-3xl">
  <nav class="mb-4 text-sm text-slate-500" aria-label="Breadcrumb">
    <a href="/" class="transition-colors hover:text-indigo-600">Home</a>
    <span class="mx-1 text-slate-300">/</span>
    <a href="/learn/" class="transition-colors hover:text-indigo-600">About</a>
    <span class="mx-1 text-slate-300">/</span>
    <span class="text-slate-700">Article</span>
  </nav>
  <article>
    <header>
      <h1 class="text-3xl font-bold tracking-tight text-slate-900">{{ article.title }}</h1>
      <p class="mt-2 text-sm text-slate-500">{{ article.published_at|date:"M j, Y" }}</p>
    </header>

    <!-- ADSENSE SLOT -->

    <div class="mt-8 leading-relaxed text-slate-700 [&_h2]:mt-10 [&_h2]:text-xl [&_h2]:font-semibold [&_h2]:tracking-tight [&_h2]:text-slate-900 [&_h3]:mt-6 [&_h3]:font-semibold [&_h3]:text-slate-900 [&_p]:mt-4 [&_a]:text-indigo-600 [&_a]:underline [&_a]:underline-offset-2 [&_ul]:mt-4 [&_ul]:list-disc [&_ul]:pl-6 [&_ol]:mt-4 [&_ol]:list-decimal [&_ol]:pl-6 [&_li]:mt-1 [&_strong]:font-semibold [&_strong]:text-slate-900 [&_code]:rounded [&_code]:bg-slate-100 [&_code]:px-1 [&_code]:py-0.5 [&_code]:text-[13px] [&_pre]:mt-4 [&_pre]:overflow-x-auto [&_pre]:rounded-xl [&_pre]:bg-slate-900 [&_pre]:p-4 [&_pre]:text-[13px] [&_pre]:leading-relaxed [&_pre]:text-slate-100 [&_pre_code]:rounded-none [&_pre_code]:bg-transparent [&_pre_code]:p-0">
      {{ body_html }}
    </div>
  </article>
</div>
{% endblock %}

{% block head_extra %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ article.title|escapejs }}",
  "description": "{{ article.meta_description|escapejs }}",
  "datePublished": "{{ article.published_at|date:'c' }}",
  "dateModified": "{{ article.updated_at|date:'c' }}",
  "author": {"@type": "Organization", "name": "Form D Explorer"},
  "publisher": {"@type": "Organization", "name": "Form D Explorer", "logo": {"@type": "ImageObject", "url": "{{ SITE_URL }}/static/favicon.svg"}},
  "mainEntityOfPage": "{{ SITE_URL }}/learn/{{ article.slug }}/"
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "Home", "item": "{{ SITE_URL }}/"},
    {"@type": "ListItem", "position": 2, "name": "About", "item": "{{ SITE_URL }}/learn/"},
    {"@type": "ListItem", "position": 3, "name": "{{ article.title|escapejs }}", "item": "{{ SITE_URL }}/learn/{{ article.slug }}/"}
  ]
}
</script>
{% endblock %}
